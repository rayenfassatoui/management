services:
  - type: web
    name: project-management-backend
    env: node
    buildCommand: |
      apt-get update && apt-get install -y python3 make g++
      npm install
      npm rebuild bcrypt --build-from-source
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: SECRET
        sync: false
    nodeVersion: 18.x